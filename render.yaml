services:
  - type: web
    name: cachetao-backend
    runtime: node
    repo: https://github.com/denaao/cachetao
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://cachetao-frontend.onrender.com

  - type: web
    name: cachetao-frontend
    runtime: static
    repo: https://github.com/denaao/cachetao
    branch: main
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cachetao-backend.onrender.com
